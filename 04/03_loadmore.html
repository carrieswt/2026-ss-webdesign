<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufgabe 3 — Load More</title>
    <style>
        /* ============================================================
           AUFGABE 3: Load More mit Arrays, Objekten & DOM-Rendering

           Hintergrund:
           Arbeiten mit Arrays, Objekten und dynamischem Rendering
           von Mock-Daten.

           Anforderungen:
           1. Funktion schreiben, die jeweils die nächsten 3 Objekte
              aus dem Array als Teaser-Cards an <main> anhängt.
           2. "Mehr laden"-Button triggert diese Funktion.
           3. Wenn alle Artikel geladen sind, wird der Button
              ausgeblendet (display = 'none') oder deaktiviert.
           4. Bonus (Infinite Scroll): Button weglassen und stattdessen
              per window.onscroll beim Erreichen des Seitenendes laden.
           ============================================================ */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #faf9f7;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 3rem 2rem 6rem;
        }

        header {
            max-width: 720px;
            margin: 0 auto 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        #cardContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 1.5rem;
            transition: box-shadow 0.15s;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #555;
        }

        .btn-wrap {
            text-align: center;
            max-width: 720px;
            margin: 2rem auto 0;
        }

        #loadMoreBtn {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        #loadMoreBtn:hover {
            background: #333;
        }

        #loadMoreBtn:disabled {
            background: #aaa;
            cursor: default;
        }
    </style>
</head>

    </header>

        <!-- Hier werden die Teaser-Cards dynamisch eingefügt -->
